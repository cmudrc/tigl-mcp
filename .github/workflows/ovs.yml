name: OVS

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ovs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pytest

      - name: Run OVS checks
        run: PYTHONPATH=src pytest tests/test_ovs_cpacs.py -v
