name: OVS

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ovs-check:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run OVS checks
        env:
          PYTHONPATH: src
        run: python -m pytest tests/test_ovs_cpacs.py -v -o "addopts="
